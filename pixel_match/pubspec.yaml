name: pixel_match
description: Level up your love life. Only the worthy match.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Game engine
  flame: ^1.14.0
  flame_audio: ^2.1.0

  # Routing
  go_router: ^13.2.0

  # Networking
  http: ^1.2.1
  web_socket_channel: ^2.4.0

  # Image handling
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # Swipe card physics
  flutter_card_swiper: ^7.0.2

  # UI helpers
  shimmer: ^3.0.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  confetti: ^0.7.0
  flutter_blurhash: ^0.8.2

  # Local storage (for JWT token)
  shared_preferences: ^2.2.2

  # Utilities
  uuid: ^4.3.3
  intl: ^0.19.0
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sprites/
    - assets/audio/
    - assets/fonts/
    - assets/brand/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  web:
    generate: true
    background_color: "#0B0B1A"
    theme_color: "#FF6B6B"
  image_path: "assets/brand/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0B0B1A"
  adaptive_icon_foreground: "assets/brand/icon_fg.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#0B0B1A"
  image: "assets/brand/splash.png"
  android_12:
    color: "#0B0B1A"
    image: "assets/brand/splash.png"
  web: false
